<text x="800" y="60" text-anchor="middle" font-size="30" font-weight="700" fill="#0f172a">Customer CRM Pipeline — How These 4 Skills Work Together</text>
<text x="800" y="92" text-anchor="middle" font-size="16" fill="#475569">M365 + Git activity, captured into daily logs, pushed to MSX (Dynamics 365)</text>
<text x="60" y="178" font-size="12" font-weight="700" fill="#64748b" letter-spacing="1.4">DATA SOURCES</text>
<text x="60" y="598" font-size="12" font-weight="700" fill="#047857" letter-spacing="1.4">FOUNDATION (used by every skill)</text>
