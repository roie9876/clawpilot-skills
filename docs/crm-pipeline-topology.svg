<rect x="340" y="210" width="320" height="150" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#softShadow)"/>
<text x="358" y="246" font-size="20" font-weight="700" fill="#1e3a8a">/daily-activity-log</text>
<text x="358" y="280" font-size="14" fill="#1f2937">Aggregates calendar, email, Teams chat,</text>
<text x="358" y="302" font-size="14" fill="#1f2937">and git commits into one activity-log.md</text>
<text x="358" y="324" font-size="14" fill="#1f2937">per project — classified by CRM category.</text>
<rect x="1060" y="210" width="320" height="150" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#softShadow)"/>
<text x="1078" y="246" font-size="20" font-weight="700" fill="#1e3a8a">/crm-activity-sync</text>
<text x="1078" y="280" font-size="14" fill="#1f2937">Reads activity-log.md and creates</text>
<text x="1078" y="302" font-size="14" fill="#1f2937">milestone tasks in MSX. Idempotent,</text>
<text x="1078" y="324" font-size="14" fill="#1f2937">auto-joins deal teams.</text>
<rect x="1060" y="470" width="320" height="150" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" filter="url(#softShadow)"/>
