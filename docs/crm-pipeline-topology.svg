<text x="78" y="690" font-size="14" fill="#1f2937">Scaffolds the per-customer folder</text>
<text x="78" y="712" font-size="14" fill="#1f2937">structure that every other skill</text>
<text x="78" y="734" font-size="14" fill="#1f2937">reads &amp; writes inside.</text>
<rect x="750" y="460" width="220" height="80" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2" filter="url(#softShadow)"/>
<text x="860.0" y="492" text-anchor="middle" font-size="18" font-weight="700" fill="#78350f">activity-log.md</text>
<text x="860.0" y="516" text-anchor="middle" font-size="13" fill="#92400e">(per customer project)</text>
