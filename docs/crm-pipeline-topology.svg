<text x="1136" y="506" font-size="20" font-weight="700" fill="#5b21b6">/msx-crm</text>
<text x="1078" y="540" font-size="14" fill="#1f2937">Backend tool layer (Node CLI).</text>
<text x="1078" y="562" font-size="14" fill="#1f2937">Query accounts, opportunities,</text>
<text x="1078" y="584" font-size="14" fill="#1f2937">milestones, tasks, deal teams.</text>
<rect x="60" y="620" width="320" height="150" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#softShadow)"/>
